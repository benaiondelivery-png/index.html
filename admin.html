<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E30613">
  <title>Admin - BENAION DELIVERY</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Logo Benaion" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
          </div>
          <div class="logo-text">
            <h1>BENAION ADMIN</h1>
            <p id="adminStatus">Painel de Controle</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="window.Auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statHoje">0</div>
          <div class="stat-label">Pedidos Hoje</div>
        </div>
        <div class="stat-card" style="background: var(--primary-yellow);">
          <div class="stat-value" id="statFaturamento">R$ 0,00</div>
          <div class="stat-label">Taxas Acumuladas</div>
        </div>
        <div class="stat-card" style="background: #2ecc71; color: white;">
          <div class="stat-value" id="statAtivos">0</div>
          <div class="stat-label">Em Entrega</div>
        </div>
      </div>

      <div class="tabs-container" style="display: flex; gap: 10px; margin: 20px 0; overflow-x: auto;">
        <button class="btn btn-small btn-primary" onclick="mostrarAba('pedidos')">📋 Todos Pedidos</button>
        <button class="btn btn-small btn-outline" onclick="mostrarAba('parceiros')">🏪 Parceiros</button>
        <button class="btn btn-small btn-outline" onclick="mostrarAba('usuarios')">👥 Usuários</button>
      </div>

      <div id="abaPedidos">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h3>Monitoramento de Pedidos</h3>
          <button class="btn btn-small" onclick="Utils.showModal('novoPedidoModal')">+ Criar Manual</button>
        </div>
        <div id="listaPedidosAdmin"></div>
      </div>

      <div id="abaParceiros" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h3>Lojas Parceiras</h3>
          <button class="btn btn-small" onclick="Utils.showModal('novoParceiroModal')">+ Nova Loja</button>
        </div>
        <div id="listaParceirosAdmin"></div>
      </div>

      <div id="abaUsuarios" class="hidden">
        <h3>Entregadores e Clientes</h3>
        <div id="listaUsuariosAdmin"></div>
      </div>

    </main>
  </div>

  <div class="modal" id="novoPedidoModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Lançar Pedido (Admin)</h3>
        <button class="modal-close" onclick="Utils.hideModal('novoPedidoModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="lancarPedidoManual(event)">
          <div class="form-group">
            <label>Nome do Cliente</label>
            <input type="text" id="manualCliente" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Produto</label>
            <input type="text" id="manualProduto" class="form-control" required>
          </div>
          <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>
              <label>Bairro Retirada</label>
              <input type="text" id="manualBairroRet" class="form-control" placeholder="Agreste" required>
            </div>
            <div>
              <label>Bairro Entrega</label>
              <input type="text" id="manualBairroEnt" class="form-control" placeholder="Cajari" required>
            </div>
          </div>
          <div class="form-group">
            <label>Taxa de Entrega (R$)</label>
            <input type="number" id="manualTaxa" class="form-control" step="0.01" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Lançar no Radar</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>

  <script>
    let todosPedidos = [];
    let todosUsuarios = [];

    async function initAdmin() {
      if (window.Auth && window.API) {
        window.Auth.requireAuth(['admin']);
        
        // Escutar TODOS os pedidos do sistema em tempo real
        window.API.escutarTodosPedidos((data) => {
          todosPedidos = data;
          atualizarDashboard();
          renderizarPedidosAdmin();
        });
      } else {
        setTimeout(initAdmin, 500);
      }
    }

    document.addEventListener('DOMContentLoaded', initAdmin);

    function atualizarDashboard() {
      const hoje = new Date().toLocaleDateString();
      const pedidosHoje = todosPedidos.filter(p => new Date(p.created_at?.seconds * 1000).toLocaleDateString() === hoje);
      
      const faturamento = pedidosHoje.reduce((acc, curr) => acc + (curr.taxaEntrega || 0), 0);
      const ativos = todosPedidos.filter(p => p.status === 'em_entrega').length;

      document.getElementById('statHoje').textContent = pedidosHoje.length;
      document.getElementById('statFaturamento').textContent = Utils.formatCurrency(faturamento);
      document.getElementById('statAtivos').textContent = ativos;
    }

    function renderizarPedidosAdmin() {
      const container = document.getElementById('listaPedidosAdmin');
      container.innerHTML = todosPedidos.map(p => `
        <div class="card" style="margin-bottom: 10px; border-left: 5px solid ${getStatusColor(p.status)}">
          <div style="display:flex; justify-content:space-between;">
            <b>#${p.id.substring(0,6)}</b>
            <span class="status-badge status-${p.status}">${p.status}</span>
          </div>
          <div style="font-size:13px; margin: 5px 0;">
            <b>Origem:</b> ${p.bairroRetirada} | <b>Destino:</b> ${p.bairro}<br>
            <b>Entregador:</b> ${p.entregadorNome || '<span style="color:red">Aguardando...</span>'}
          </div>
          <div style="text-align:right">
            <button class="btn btn-small btn-outline" onclick="cancelarPedidoAdmin('${p.id}')">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    function getStatusColor(status) {
      switch(status) {
        case 'aguardando_entregador': return '#ffc107';
        case 'em_entrega': return '#2196f3';
        case 'finalizado': return '#2ecc71';
        default: return '#999';
      }
    }

    function mostrarAba(aba) {
      document.getElementById('abaPedidos').classList.toggle('hidden', aba !== 'pedidos');
      document.getElementById('abaParceiros').classList.toggle('hidden', aba !== 'parceiros');
      document.getElementById('abaUsuarios').classList.toggle('hidden', aba !== 'usuarios');
    }

    async function lancarPedidoManual(e) {
      e.preventDefault();
      const data = {
        clienteNome: document.getElementById('manualCliente').value,
        produto: document.getElementById('manualProduto').value,
        bairroRetirada: document.getElementById('manualBairroRet').value,
        bairro: document.getElementById('manualBairroEnt').value,
        taxaEntrega: parseFloat(document.getElementById('manualTaxa').value),
        status: 'aguardando_entregador',
        origem: 'ADMIN'
      };

      try {
        await window.API.createPedido(data);
        Utils.showToast("Pedido lançado manualmente!", "success");
        Utils.hideModal('novoPedidoModal');
        e.target.reset();
      } catch (err) {
        Utils.showToast("Erro ao lançar.", "error");
      }
    }

    async function cancelarPedidoAdmin(id) {
      if(confirm("Tem certeza que deseja remover este pedido?")) {
        await window.API.deletePedido(id);
        Utils.showToast("Pedido removido", "success");
      }
    }
  </script>

  <style>
    .hidden { display: none; }
    .stat-card { padding: 15px; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    .stat-value { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
    .stat-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  </style>
</body>
</html>
