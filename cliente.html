<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E30613">
  <title>Cliente - BENAION DELIVERY</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Logo Benaion" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
          </div>
          <div class="logo-text">
            <h1 id="clienteNome">Carregando...</h1>
            <p>Painel do Cliente</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="window.Auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </header>

    <main class="page">
      <div class="card" style="background: linear-gradient(135deg, var(--primary-red), #c00510); color: white; text-align: center; padding: 20px;">
        <h2 style="margin-bottom: 8px;">🚀 Benaion Delivery</h2>
        <p style="opacity: 0.9; font-size: 14px;">Logística rápida em Laranjal do Jari</p>
      </div>

      <button class="btn btn-primary mb-2" onclick="Utils.showModal('novoPedidoModal')" style="font-size: 18px; padding: 18px; box-shadow: 0 4px 15px rgba(227, 6, 19, 0.3);">
        <i class="fas fa-motorcycle"></i> Solicitar Nova Entrega
      </button>

      <div class="card" style="background: #fff8f8; border: 1px solid #ffcccc;">
        <h3 style="margin-bottom: 12px; color: var(--primary-red); font-size: 16px;">🏪 Parceiros</h3>
        <div id="listaParceiros" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;"></div>
      </div>

      <h3 style="margin: 24px 0 12px; color: var(--dark); display: flex; justify-content: space-between;">
        📦 Meus Pedidos <small id="contadorPedidos" style="font-size: 12px; background: #eee; padding: 2px 8px; border-radius: 10px;">0</small>
      </h3>
      <div id="listaPedidos"></div>

      <div class="card" style="background: #222; color: #fff; margin-top: 24px; border: none;">
        <h4 style="color: var(--primary-yellow); margin-bottom: 12px;"><i class="fas fa-shield-alt"></i> Segurança BENAION</h4>
        <p style="font-size: 12px; opacity: 0.8; line-height: 1.4;">
          🚫 Não transportamos Bebidas, Cigarros, Drogas ou Pessoas.<br>
          ✅ Pagamento via PIX ou Cartão direto no app ou ao entregador.
        </p>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active"><i class="fas fa-home"></i><span>Início</span></button>
      <button class="nav-item" onclick="Utils.showModal('novoPedidoModal')"><i class="fas fa-plus-circle"></i><span>Pedir</span></button>
      <button class="nav-item" onclick="mostrarPerfil()"><i class="fas fa-user"></i><span>Perfil</span></button>
    </nav>
  </div>

  <div class="modal" id="novoPedidoModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">📝 Dados da Entrega</h3>
        <button class="modal-close" onclick="Utils.hideModal('novoPedidoModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="novoPedidoForm" onsubmit="criarPedido(event)">
          
          <label class="form-label">Onde vamos buscar? (Retirada)</label>
          <div class="form-group-flex" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select class="form-control" id="pedidoBairroRetirada" required onchange="atualizarTaxaEstimada()">
              <option value="Agreste">Bairro: Agreste</option>
              <option value="Nova esperança">Nova esperança</option>
              <option value="Prosperidade">Prosperidade</option>
              <option value="Castanheira">Castanheira</option>
              <option value="Cajari">Cajari</option>
              <option value="centro">Centro</option>
              <option value="Malvinas">Malvinas</option>
              <option value="monte dourado">Monte Dourado</option>
              </select>
            <input type="text" class="form-control" id="pedidoRetiradaLocal" required placeholder="Ex: Panificadora">
          </div>

          <label class="form-label" style="margin-top:15px;">O que deve ser entregue?</label>
          <input type="text" class="form-control" id="pedidoProduto" required placeholder="Ex: 1 Envelope, 2 Marmitas...">

          <label class="form-label" style="margin-top:15px;">Para onde vamos levar? (Destino)</label>
          <div class="form-group">
             <select class="form-control" id="pedidoBairroEntrega" required onchange="atualizarTaxaEstimada()">
               <option value="">Selecione o Bairro de Destino</option>
