<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BENAION DELIVERY - Conectando você ao que precisa, rápido e seguro">
  <meta name="theme-color" content="#E30613">
  <title>BENAION DELIVERY - Login</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-logo" style="margin-bottom: 30px; text-align: center;">
      <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" 
           alt="Benaion Delivery" 
           style="width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--primary-yellow); object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    </div>

    <div class="login-card">
      <h2 style="text-align: center; margin-bottom: 24px; color: var(--dark);">Entrar</h2>

      <button onclick="window.Auth.loginComGoogle()" class="btn-google">
  <img src="img/google-icon.png"> Continuar com Google
</button>


      <div class="divider">ou</div>

      <form id="loginForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" id="btnLogin">
          <i class="fas fa-sign-in-alt"></i>
          Entrar
        </button>
      </form>

      <div class="divider">não tem conta?</div>

      <button class="btn btn-outline" onclick="handleOpenRegister()">
        <i class="fas fa-user-plus"></i>
        Criar Conta
      </button>
    </div>

    <div style="text-align: center; margin-top: 24px; color: var(--white); opacity: 0.9;">
      <p style="font-size: 13px;">Laranjal do Jari • Monte Dourado</p>
      <p style="font-size: 12px; margin-top: 8px;">v1.4.0</p>
    </div>
  </div>

  <div class="modal" id="registerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Criar Conta</h3>
        <button class="modal-close" onclick="handleCloseRegister()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="registerName" placeholder="Seu nome" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de Conta</label>
            <select class="form-control" id="registerUserType" required>
              <option value="cliente">Cliente</option>
              <option value="entregador">Entregador</option>
              <option value="parceiro">Parceiro/Comerciante</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="registerPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" id="btnRegSubmit">
            <i class="fas fa-check"></i>
            Criar Conta
          </button>
        </form>
      </div>
    </div>
  </div>

<script src="js/utils.js"></script>
<script type="module" src="js/api.js?v=1.5"></script>

  <script>
    // Funções de interface para evitar erro se Utils não carregar
    function handleOpenRegister() {
      if (window.Utils) Utils.showModal('registerModal');
      else document.getElementById('registerModal').style.display = 'flex';
    }

    function handleCloseRegister() {
      if (window.Utils) Utils.hideModal('registerModal');
      else document.getElementById('registerModal').style.display = 'none';
    }

    function handleGoogleInfo() {
      const msg = 'Login Google em breve';
      if (window.Utils) Utils.showToast(msg, 'info');
      else alert(msg);
    }
    async function handleGoogleLogin() {
  try {
    await window.Auth.loginWithGoogle();
  } catch (error) {
    alert(error.message);
  }
}

    // LOGIN
    async function handleEmailLogin(event) {
      event.preventDefault();
      const btn = document.getElementById('btnLogin');
      const originalText = btn.innerHTML;
      
      if (!window.Auth) {
        alert("O sistema ainda está conectando ao Firebase. Aguarde 2 segundos.");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await window.Auth.loginWithEmail(email, password);
        window.Auth.redirectToDashboard();
      } catch (error) {
        alert("Erro no Login: " + error.message);
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // CADASTRO
    async function handleRegister(event) {
      event.preventDefault();
      const btn = document.getElementById('btnRegSubmit');
      const originalText = btn.innerHTML;

      if (!window.Auth) {
        alert("Erro: Conexão com Firebase não estabelecida.");
        return;
      }

      const dadosParaCadastro = {
        name: document.getElementById('registerName').value,
        email: document.getElementById('registerEmail').value,
        userType: document.getElementById('registerUserType').value,
        password: document.getElementById('registerPassword').value
      };

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando...';

      try {
        await window.Auth.register(dadosParaCadastro);
        alert('Conta criada com sucesso!');
        setTimeout(() => { window.Auth.redirectToDashboard(); }, 1000);
      } catch (error) {
        alert("ERRO DO FIREBASE: " + error.message);
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }
  </script>
</body>
</html>
