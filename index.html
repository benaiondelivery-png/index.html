<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BENAION DELIVERY - Conectando você ao que precisa, rápido e seguro">
  <meta name="theme-color" content="#E30613">
  <title>BENAION DELIVERY - Login</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="stylesheet" href="css/style.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="login-page">
    <div class="login-logo" style="margin-bottom: 30px; text-align: center;">
      <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" 
           alt="Benaion Delivery" 
           style="width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--primary-yellow); object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    </div>

    <div class="login-card">
      <h2 style="text-align: center; margin-bottom: 24px; color: var(--dark);">Entrar</h2>

      <button class="btn btn-white" onclick="handleGoogleLogin()">
        <i class="fab fa-google"></i>
        Continuar com Google
      </button>

      <div class="divider">ou</div>

      <form id="loginForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i>
          Entrar
        </button>
      </form>

      <div class="divider">não tem conta?</div>

      <button class="btn btn-outline" onclick="Utils.showModal('registerModal')">
        <i class="fas fa-user-plus"></i>
        Criar Conta
      </button>
    </div>

    <div style="text-align: center; margin-top: 24px; color: var(--white); opacity: 0.9;">
      <p style="font-size: 13px;">Laranjal do Jari • Monte Dourado</p>
      <p style="font-size: 12px; margin-top: 8px;">v1.0.0</p>
    </div>
  </div>

  <div class="modal" id="registerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Criar Conta</h3>
        <button class="modal-close" onclick="Utils.hideModal('registerModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="registerName" placeholder="Seu nome" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de Conta</label>
            <select class="form-control" id="registerUserType" required>
              <option value="cliente">Cliente</option>
              <option value="entregador">Entregador</option>
              <option value="parceiro">Parceiro/Comerciante</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="registerPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-check"></i>
            Criar Conta
          </button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCl-U9X9qxohjDpgr8y2pdkS3j-qNm19pk",
      authDomain: "benaion-delivery.firebaseapp.com",
      projectId: "benaion-delivery",
      storageBucket: "benaion-delivery.firebasestorage.app",
      messagingSenderId: "309927409217",
      appId: "1:309927409217:web:7a105cb5237b2294b1b8c0",
      measurementId: "G-TK1KNW14WH"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.auth = getAuth(app);
    console.log("Firebase conectado com sucesso!");
  </script>

<script src="js/utils.js"></script>
<script src="js/api.js" type="module"></script> 
  <script src="js/auth.js"></script>

  <script>
    // Funções de controle de UI
    async function handleEmailLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await Auth.loginWithEmail(email, password);
        Auth.redirectToDashboard();
      } catch (error) {
        Utils.showToast(error.message, 'error');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      const data = {
        name: document.getElementById('registerName').value,
        email: document.getElementById('registerEmail').value,
        userType: document.getElementById('registerUserType').value,
        password: document.getElementById('registerPassword').value
      };
      try {
        await Auth.register(data);
        Utils.showToast('Conta criada!', 'success');
        Auth.redirectToDashboard();
      } catch (error) {
        Utils.showToast(error.message, 'error');
      }
    }
  </script>
</body>
</html>
