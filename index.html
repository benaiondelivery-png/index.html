<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="BENAION DELIVERY - O melhor de Laranjal do Jari e Monte Dourado">
  <meta name="theme-color" content="#E30613">
  <title>BENAION DELIVERY | Login</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <style>
    /* Estilos de Alta Performance */
    body {
      background: linear-gradient(180deg, var(--primary-red) 0%, #a0040d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .btn-google {
      background: white;
      border: 1px solid #ddd;
      color: #555;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-google:active { transform: scale(0.98); background: #f8f8f8; }

    .input-animated {
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 12px 16px;
      transition: all 0.3s ease;
    }

    .input-animated:focus {
      border-color: var(--primary-red);
      box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.1);
    }

    .register-type-card {
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .register-type-card.active {
      border-color: var(--primary-red);
      background: rgba(227, 6, 19, 0.05);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(227, 6, 19, 0.95);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="logo-icon animate__animated animate__pulse animate__infinite">
        <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" style="width: 80px; border-radius: 50%;">
    </div>
    <p style="margin-top: 15px; font-weight: 600;">Conectando à Benaion...</p>
  </div>

  <div class="login-container animate__animated animate__fadeInUp">
    
    <div class="login-logo" style="text-align: center; margin-bottom: 25px;">
      <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" 
           alt="Benaion Delivery" 
           style="width: 130px; height: 130px; border-radius: 50%; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
    </div>

    <div class="login-card">
      <h2 style="text-align: center; font-weight: 800; margin-bottom: 8px; color: var(--dark);">Bem-vindo</h2>
      <p style="text-align: center; color: #777; font-size: 14px; margin-bottom: 24px;">Entre para continuar</p>

      <button onclick="handleGoogleLogin()" class="btn btn-google w-100 mb-3">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Continuar com Google
      </button>

      <div class="divider">ou use seu email</div>

      <form id="loginForm" onsubmit="handleEmailLogin(event)">
        <div class="form-group">
          <input type="email" class="form-control input-animated" id="email" placeholder="Email" required>
        </div>

        <div class="form-group">
          <input type="password" class="form-control input-animated" id="password" placeholder="Senha" required>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="btnLogin" style="padding: 14px; font-weight: 700;">
          ENTRAR
        </button>
      </form>

      <div style="text-align: center; margin-top: 20px;">
        <span style="color: #777; font-size: 14px;">Não tem conta?</span>
        <a href="#" onclick="handleOpenRegister()" style="color: var(--primary-red); font-weight: 700; text-decoration: none; margin-left: 5px;">Criar Agora</a>
      </div>
    </div>

    <div style="text-align: center; margin-top: 30px; color: rgba(255,255,255,0.8);">
      <p style="font-size: 12px; letter-spacing: 1px; font-weight: 600;">LARANJAL DO JARI • MONTE DOURADO</p>
      <p style="font-size: 11px; margin-top: 5px; opacity: 0.6;">BENAION DELIVERY 2026 • v1.5.0</p>
    </div>
  </div>

  <div class="modal" id="registerModal">
    <div class="modal-content animate__animated animate__zoomIn">
      <div class="modal-header">
        <h3 class="modal-title">Começar na Benaion</h3>
        <button class="modal-close" onclick="handleCloseRegister()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="registerForm" onsubmit="handleRegister(event)">
          
          <div class="form-group">
            <label class="form-label">Eu quero ser:</label>
            <select class="form-control" id="registerUserType" onchange="toggleParceiroFields()" required>
              <option value="cliente">😋 Cliente (Pedir comida/produtos)</option>
              <option value="entregador">🛵 Entregador (Fazer entregas)</option>
              <option value="parceiro">🏢 Parceiro (Vender produtos)</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" id="labelNome">Nome Completo</label>
            <input type="text" class="form-control" id="registerName" placeholder="Como quer ser chamado?" required>
          </div>

          <div id="parceiroExtraFields" class="hidden">
             <div class="form-group">
                <label class="form-label">Nome do Empreendimento/Loja</label>
                <input type="text" class="form-control" id="storeName" placeholder="Ex: Burguer do Jari">
             </div>
          </div>

          <div class="form-group">
            <label class="form-label">Seu melhor Email</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="exemplo@gmail.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Criar Senha</label>
            <input type="password" class="form-control" id="registerPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>

          <button type="submit" class="btn btn-primary w-100" id="btnRegSubmit">
            CONCLUIR CADASTRO
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script> <script src="js/api.js"></script>

  <script>
    const loading = document.getElementById('loadingOverlay');

    function toggleParceiroFields() {
      const type = document.getElementById('registerUserType').value;
      const extra = document.getElementById('parceiroExtraFields');
      const labelNome = document.getElementById('labelNome');
      
      if (type === 'parceiro') {
        extra.classList.remove('hidden');
        labelNome.innerText = "Nome do Responsável";
      } else {
        extra.classList.add('hidden');
        labelNome.innerText = "Nome Completo";
      }
    }

    function handleOpenRegister() {
      Utils.showModal('registerModal');
    }

    function handleCloseRegister() {
      Utils.hideModal('registerModal');
    }

    async function handleEmailLogin(event) {
      event.preventDefault();
      loading.style.display = 'flex';
      
      try {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        await Auth.loginWithEmail(email, pass);
      } catch (error) {
        loading.style.display = 'none';
        Utils.showToast(error.message, 'error');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      loading.style.display = 'flex';

      const userType = document.getElementById('registerUserType').value;
      const dados = {
        name: document.getElementById('registerName').value,
        email: document.getElementById('registerEmail').value,
        userType: userType,
        password: document.getElementById('registerPassword').value,
        storeName: (userType === 'parceiro') ? document.getElementById('storeName').value : null
      };

      try {
        await Auth.register(dados);
        Utils.showToast("Bem-vindo à família Benaion!", "success");
      } catch (error) {
        loading.style.display = 'none';
        Utils.showToast(error.message, "error");
      }
    }

    async function handleGoogleLogin() {
      loading.style.display = 'flex';
      try {
        await Auth.loginWithGoogle();
      } catch (error) {
        loading.style.display = 'none';
        Utils.showToast(error.message, 'error');
      }
    }
  </script>
</body>
</html>
