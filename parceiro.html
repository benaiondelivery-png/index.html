<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E30613">
  <title>Benaion Parceiro - Gestão Total</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .hidden { display: none !important; }
    .badge-status { padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; }
    .status-open { background: #e8f5e9; color: #2ecc71; }
    .status-closed { background: #ffebee; color: #e30613; }
    
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
    .product-card { background: white; border-radius: 8px; padding: 10px; border: 1px solid #eee; text-align: center; }
    .product-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
    
    .tab-section { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="https://i.postimg.cc/T2Vt53JP/Vermelho-delivery-logo-20260227-011329-0005.png" alt="Logo Benaion">
          </div>
          <div class="logo-text">
            <h1 id="lojaNome">Sua Loja</h1>
            <p id="lojaStatus"><span class="badge-status status-open">LOJA ABERTA</span></p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="toggleLojaStatus()" title="Abrir/Fechar">
            <i class="fas fa-store"></i>
          </button>
          <button class="header-btn" onclick="Auth.logout()">
            <i class="fas fa-power-off"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="page">
      <section id="aba-pedidos" class="tab-section">
        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
          <div class="card" style="text-align: center; padding: 10px;">
            <div style="font-size: 20px; font-weight: bold; color: var(--primary-red);" id="vendasHoje">0</div>
            <div style="font-size: 10px; color: var(--gray);">Hoje</div>
          </div>
          <div class="card" style="text-align: center; padding: 10px;">
            <div style="font-size: 20px; font-weight: bold;" id="faturamentoHoje">R$ 0</div>
            <div style="font-size: 10px; color: var(--gray);">Ganhos</div>
          </div>
          <div class="card" style="text-align: center; padding: 10px;">
            <div style="font-size: 20px; font-weight: bold; color: #2ecc71;" id="pedidosAtivos">0</div>
            <div style="font-size: 10px; color: var(--gray);">Ativos</div>
          </div>
        </div>

        <button class="btn btn-primary" onclick="abrirModalPedido()" style="width: 100%; margin-bottom: 20px;">
          <i class="fas fa-plus"></i> NOVO PEDIDO MANUAL
        </button>

        <div id="listaPedidos">
           </div>
      </section>

      <section id="aba-produtos" class="tab-section hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3>Meu Cardápio</h3>
          <button class="btn btn-small btn-primary" onclick="Utils.showModal('modalProduto')">+ Novo</button>
        </div>
        <div class="product-grid" id="gridProdutos">
          </div>
      </section>

      <section id="aba-perfil" class="tab-section hidden">
        <div class="card">
          <h3>Dados do Empreendimento</h3>
          <form id="formPerfilLoja" onsubmit="salvarPerfil(event)" style="margin-top: 15px;">
            <div class="form-group">
              <label>Nome Fantasia</label>
              <input type="text" class="form-control" id="nomeFantasia" placeholder="Nome da sua loja">
            </div>
            <div class="form-group">
              <label>Categoria</label>
              <select class="form-control" id="categoriaLoja">
                <option value="restaurante">Restaurante / Lanchonete</option>
                <option value="farmacia">Farmácia</option>
                <option value="mercado">Mercado</option>
                <option value="outros">Outros</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Salvar Dados</button>
          </form>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" id="nav-pedidos" onclick="switchTab('pedidos')">
        <i class="fas fa-receipt"></i><span>Pedidos</span>
      </button>
      <button class="nav-item" id="nav-produtos" onclick="switchTab('produtos')">
        <i class="fas fa-hamburger"></i><span>Produtos</span>
      </button>
      <button class="nav-item" id="nav-perfil" onclick="switchTab('perfil')">
        <i class="fas fa-cog"></i><span>Gestão</span>
      </button>
    </nav>
  </div>

  <div class="modal" id="modalProduto">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Cadastrar Produto</h3>
        <button class="modal-close" onclick="Utils.hideModal('modalProduto')">&times;</button>
      </div>
      <div class="modal-body">
