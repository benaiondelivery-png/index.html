<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E30613">
  <title>Entregador - BENAION DELIVERY</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-motorcycle"></i>
          </div>
          <div class="logo-text">
            <h1 id="entregadorNome">Entregador</h1>
            <p>Painel de Entregas</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn" id="btnStatus" onclick="toggleStatus()" title="Status">
            <i class="fas fa-circle"></i>
          </button>
          <button class="header-btn" onclick="Auth.logout()" title="Sair">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="page" id="mainContent">
      <!-- Estatísticas do Entregador -->
      <div class="card" style="background: linear-gradient(135deg, var(--primary-red) 0%, #c00510 100%); color: white; margin-bottom: 20px;">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center;">
          <div>
            <div style="font-size: 28px; font-weight: 700;" id="statHoje">0</div>
            <div style="font-size: 12px; opacity: 0.9;">Hoje</div>
          </div>
          <div>
            <div style="font-size: 28px; font-weight: 700;" id="statSemana">0</div>
            <div style="font-size: 12px; opacity: 0.9;">Semana</div>
          </div>
          <div>
            <div style="font-size: 28px; font-weight: 700;" id="statMes">0</div>
            <div style="font-size: 12px; opacity: 0.9;">Mês</div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display: flex; gap: 8px; margin-bottom: 20px;">
        <button class="btn btn-small btn-primary" onclick="mostrarAba('disponiveis')">
          <i class="fas fa-inbox"></i> Disponíveis
        </button>
        <button class="btn btn-small btn-outline" onclick="mostrarAba('minhas')">
          <i class="fas fa-tasks"></i> Minhas Entregas
        </button>
        <button class="btn btn-small btn-outline" onclick="mostrarAba('historico')">
          <i class="fas fa-history"></i> Histórico
        </button>
      </div>

      <!-- Aba Pedidos Disponíveis -->
      <div id="abaDisponiveis">
        <div id="listaPedidosDisponiveis"></div>
      </div>

      <!-- Aba Minhas Entregas -->
      <div id="abaMinhas" class="hidden">
        <div id="listaMinhasEntregas"></div>
      </div>

      <!-- Aba Histórico -->
      <div id="abaHistorico" class="hidden">
        <div id="listaHistorico"></div>
      </div>
    </main>

    <!-- Navegação Inferior -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="mostrarAba('disponiveis')">
        <i class="fas fa-inbox"></i>
        <span>Disponíveis</span>
      </button>
      <button class="nav-item" onclick="mostrarAba('minhas')">
        <i class="fas fa-tasks"></i>
        <span>Minhas</span>
      </button>
      <button class="nav-item" onclick="mostrarAba('historico')">
        <i class="fas fa-history"></i>
        <span>Histórico</span>
      </button>
      <button class="nav-item" id="navStatus" onclick="toggleStatus()">
        <i class="fas fa-circle"></i>
        <span>Offline</span>
      </button>
    </nav>
  </div>

  <!-- Modal Detalhes da Entrega -->
  <div class="modal" id="detalhesEntregaModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">📦 Detalhes da Entrega</h3>
        <button class="modal-close" onclick="Utils.hideModal('detalhesEntregaModal')">&times;</button>
      </div>
      <div class="modal-body" id="detalhesEntregaContent">
        <!-- Conteúdo dinâmico -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/entregador.js"></script>
</body>
  </html>
